<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Assistant Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          colors: {
            transparent: 'transparent',
            current: 'currentColor',
            white: '#ffffff',
            black: '#000000',
            gray: { // Neutral gray palette to avoid blue/purple tint
              25: '#fcfcfd', // Custom very light gray
              50: '#fafafa',
              100: '#f5f5f5',
              200: '#e5e5e5',
              300: '#d4d4d4',
              400: '#a3a3a3',
              500: '#737373',
              600: '#525252',
              700: '#404040',
              800: '#262626',
              900: '#171717',
            },
            red: {
              100: '#FEE2E2',
              800: '#991B1B',
            },
            yellow: {
              100: '#FEF9C3',
              800: '#92400E',
            },
            'dark-petrol': '#005F6B',
            'brand-dark': '#2d3748',
            'brand-mint': {
              '100': '#D1FAE5',
              '500': '#6EE7B7',
              '600': '#34D399',
              '700': '#059669',
            },
            'brand-lilac': {
              'bg': '#FCFAFF', // Brighter, less saturated background
              'header': '#F8F5FF', // Corresponding header color
            },
            'user-bubble-bg': '#EDE9FE', // Softer, brighter user message bubble
            'brand-charcoal': '#333333',
          },
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            keyframes: {
              'fade-in-down': {
                '0%': {
                    opacity: '0',
                    transform: 'translateY(-10px)'
                },
                '100%': {
                    opacity: '1',
                    transform: 'translateY(0)'
                },
              }
            },
            animation: {
              'fade-in-down': 'fade-in-down 0.3s ease-out'
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* For Webkit-based browsers (Chrome, Safari, Edge) */
      ::-webkit-scrollbar {
        width: 10px; /* Width of the scrollbar */
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: transparent; /* Make track transparent */
      }

      ::-webkit-scrollbar-thumb {
        background-color: #d4d4d4; /* gray-300 */
        border-radius: 10px; /* Rounded corners for the thumb */
        border: 3px solid transparent; /* Creates padding around thumb */
        background-clip: content-box; /* Ensures the border acts as padding */
      }

      ::-webkit-scrollbar-thumb:hover {
        background-color: #a3a3a3; /* gray-400 on hover */
      }

      /* For Firefox */
      html {
        scrollbar-width: thin; /* "auto" or "thin" */
        scrollbar-color: #d4d4d4 transparent; /* thumb and track color */
      }
    </style>
